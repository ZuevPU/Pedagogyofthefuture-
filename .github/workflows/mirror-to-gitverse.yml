name: Mirror to GitVerse

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitVerse
        env:
          GITVERSE_TOKEN: ${{ secrets.GITVERSE_TOKEN }}
        run: |
          if [ -z "$GITVERSE_TOKEN" ]; then
            echo "GITVERSE_TOKEN is not configured. Skipping mirror to GitVerse."
            exit 0
          fi
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add gitverse "https://oauth2:${GITVERSE_TOKEN}@gitverse.ru/mashukOnline/Pedagogyofthefuture.git" || true
          git push gitverse HEAD:master
