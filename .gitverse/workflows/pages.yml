name: Publish Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          cp -r docs/. _site/

      - name: Upload pages artifact
        uses: gitverse/upload-pages-artifact@v1.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: gitverse/deploy-pages@v1.0.0
